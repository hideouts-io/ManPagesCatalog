name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Release Archive
        run: |
          xcodebuild archive \
            -project ManPageCatalog.xcodeproj \
            -scheme ManPageCatalog \
            -configuration Release \
            -archivePath $RUNNER_TEMP/ManPageCatalog.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package .app into zip (app only, no source)
        run: |
          ditto -ck --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/ManPageCatalog.xcarchive/Products/Applications/Man Page Catalog.app" \
            ManPageCatalog-macOS.zip

      - name: Verify zip contains only the app
        run: unzip -l ManPageCatalog-macOS.zip | head -5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ManPageCatalog-macOS
          path: ManPageCatalog-macOS.zip

      - name: Create GitHub Release (app zip only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ManPageCatalog-macOS.zip
          fail_on_unmatched_files: true
          body: |
            ## Man Page Catalog ${{ github.ref_name }}

            ### Install
            1. Download `ManPageCatalog-macOS.zip` below
            2. Unzip — drag `Man Page Catalog.app` to `/Applications`
            3. Install dependencies: `brew install groff ghostscript`
            4. Right-click the app → **Open** → **Open** (first launch only)

            ### Requirements
            - macOS 13+
            - Homebrew: `brew install groff ghostscript`
